<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Usuario — Sistema Genérico</title>
    <link rel="stylesheet" href="/NRC30713/Proyecto_pw/estilos/main.css?v=26">
    <link rel="stylesheet" href="/NRC30713/Proyecto_pw/estilos/dashboard.css?v=26">
    <link rel="stylesheet" href="/NRC30713/Proyecto_pw/estilos/components.css?v=26">
</head>
<body class="pag-contenido">

    <main class="contenido">
        <div class="breadcrumb">
            <a href="/NRC30713/Proyecto_pw/paginas/usuarios/index.html">Usuarios</a>
            <span>›</span><span>Nuevo Usuario</span>
        </div>

        <div class="pag-titulo-wrap">
            <h1 class="pag-titulo">Nuevo Usuario</h1>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-titulo">Datos del usuario</span>
            </div>
            <div class="card-body">
                <form id="formUsuario" novalidate autocomplete="off">
                    <div class="form-grid">

                        <div class="form-grupo">
                            <label class="form-label" for="txtNombre">Nombre completo</label>
                            <input class="form-control" type="text" id="txtNombre" placeholder="Nombre y apellido">
                            <span class="form-error"></span>
                        </div>

                        <div class="form-grupo">
                            <label class="form-label" for="txtUsername">Nombre de usuario</label>
                            <input class="form-control" type="text" id="txtUsername" placeholder="usuario123">
                            <span class="form-error"></span>
                        </div>

                        <div class="form-grupo">
                            <label class="form-label" for="txtEmail">Correo electrónico</label>
                            <input class="form-control" type="email" id="txtEmail" placeholder="correo@empresa.com">
                            <span class="form-error"></span>
                        </div>

                        <div class="form-grupo">
                            <label class="form-label" for="selRol">Rol</label>
                            <select class="form-control" id="selRol">
                                <option value="">-- Seleccione --</option>
                            </select>
                            <span class="form-error"></span>
                        </div>

                        <div class="form-grupo full">
                            <label class="form-label" for="txtPassword">Contraseña</label>
                            <input class="form-control" type="password" id="txtPassword" placeholder="Mínimo 8 caracteres">
                            <span class="form-error"></span>
                            <span class="form-ayuda" id="ayudaPassword"></span>
                        </div>

                    </div>

                    <div class="form-acciones">
                        <button type="submit" class="btn btn-primary">Guardar Usuario</button>
                        <button type="button" class="btn btn-secondary" id="btnCancelar">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div id="alerta-global"></div>

    <script src="/NRC30713/Proyecto_pw/scripts/config.js?v=26"></script>
    <script src="/NRC30713/Proyecto_pw/scripts/utils.js?v=26"></script>
    <script src="/NRC30713/Proyecto_pw/scripts/session.js?v=26"></script>
    <script src="/NRC30713/Proyecto_pw/scripts/validaciones.js?v=26"></script>
    <script src="/NRC30713/Proyecto_pw/scripts/router.js?v=26"></script>
    <script src="/NRC30713/Proyecto_pw/scripts/usuarios.js?v=26"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('ayudaPassword').textContent = Validaciones?.descripcionPolitica?.() || '';
            iniciarFormUsuario('crear');
        });
    </script>
</body>
</html>
