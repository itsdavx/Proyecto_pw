<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios — Sistema Empresarial</title>
    <link rel="stylesheet" href="/NRC30713-Web/Proyecto_pw/estilos/main.css?v=10">
    <link rel="stylesheet" href="/NRC30713-Web/Proyecto_pw/estilos/dashboard.css?v=10">
    <link rel="stylesheet" href="/NRC30713-Web/Proyecto_pw/estilos/components.css?v=10">
</head>
<body class="pag-contenido">

    <main class="contenido">
        <div class="breadcrumb">
            <span>Inicio</span><span>›</span><span>Usuarios</span>
        </div>

        <div class="pag-titulo-wrap">
            <div>
                <h1 class="pag-titulo">Usuarios</h1>
                <p class="pag-subtitulo">Gestión de cuentas de usuario del sistema</p>
            </div>
            <button class="btn btn-primary" id="btnNuevoUsuario">+ Nuevo Usuario</button>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-titulo">Listado de Usuarios</span>
                <div class="toolbar-izq">
                    <select class="form-control" id="selFiltroRol" style="width:auto">
                        <option value="">Todos los roles</option>
                    </select>
                    <select class="form-control" id="selFiltroEstado" style="width:auto">
                        <option value="">Todos</option>
                        <option value="1">Activos</option>
                        <option value="0">Inactivos</option>
                    </select>
                    <div class="busqueda-wrap">
                        <span class="busqueda-icono">⊙</span>
                        <input type="text" id="txtBuscar" placeholder="Buscar usuario...">
                    </div>
                </div>
            </div>
            <div class="tabla-wrap">
                <table class="tabla">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nombre / Usuario</th>
                            <th>Correo</th>
                            <th>Rol</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyUsuarios">
                        <tr><td colspan="6" class="tabla-vacia">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="alerta-global"></div>

    <script src="/NRC30713-Web/Proyecto_pw/scripts/config.js?v=10"></script>
    <script src="/NRC30713-Web/Proyecto_pw/scripts/utils.js?v=10"></script>
    <script src="/NRC30713-Web/Proyecto_pw/scripts/session.js?v=10"></script>
    <script src="/NRC30713-Web/Proyecto_pw/scripts/router.js?v=10"></script>
    <script src="/NRC30713-Web/Proyecto_pw/scripts/usuarios.js?v=10"></script>
    <script>document.addEventListener('DOMContentLoaded', iniciarListaUsuarios);</script>
</body>
</html>
