<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña — Sistema Genérico</title>
    <link rel="stylesheet" href="/NRC30713/Proyecto_pw/estilos/main.css?v=28">
    <link rel="stylesheet" href="/NRC30713/Proyecto_pw/estilos/dashboard.css?v=28">
    <link rel="stylesheet" href="/NRC30713/Proyecto_pw/estilos/components.css?v=28">
    <style>
        .fortaleza-barra-fondo {
            height:         6px;
            background:     var(--border);
            border-radius:  4px;
            overflow:       hidden;
            margin-top:     .4rem;
        }
        #barraFortaleza {
            height:     100%;
            width:      0;
            background: var(--border);
            border-radius: 4px;
            transition: width .3s, background .3s;
        }
        #etiquetaFortaleza {
            font-size:  .75rem;
            color:      var(--text-muted);
            margin-top: .2rem;
        }
        .btn-toggle-pass {
            background:  none;
            border:      none;
            cursor:      pointer;
            font-size:   1rem;
            padding:     .4rem;
            color:       var(--text-muted);
            flex-shrink: 0;
        }
        .input-pass-wrap {
            display:     flex;
            align-items: center;
            border:      1.5px solid var(--border);
            border-radius: var(--radius);
            background:  #f8fafc;
            overflow:    hidden;
            transition:  border-color var(--transition);
        }
        .input-pass-wrap:focus-within {
            border-color: var(--primary);
            background:   #ffffff;
            box-shadow:   0 0 0 3px rgba(37,99,235,.12);
        }
        .input-pass-wrap.error { border-color: var(--danger); }
        .input-pass-wrap input {
            border:     none;
            background: transparent;
            outline:    none;
            flex:       1;
            padding:    .6rem .85rem;
        }
    </style>
</head>
<body class="pag-contenido">

    <main class="contenido">
        <div class="breadcrumb">
            <span>Inicio</span><span>›</span><span>Cambiar Contraseña</span>
        </div>

        <div class="pag-titulo-wrap">
            <h1 class="pag-titulo">Cambiar Contraseña</h1>
        </div>

        <!-- Aviso primer login -->
        <div class="d-none" id="avisoObligatorio"
            style="background:var(--warning-light);border:1px solid #fcd34d;
                   border-radius:var(--radius);padding:.9rem 1.2rem;margin-bottom:1.4rem;
                   color:var(--warning)">
            ⚠ Debe cambiar su contraseña antes de continuar. Este es su primer acceso al sistema.
        </div>

        <div class="card" style="max-width:520px">
            <div class="card-header">
                <span class="card-titulo">Nueva contraseña</span>
            </div>
            <div class="card-body">
                <form id="formCambiarPassword" novalidate>

                    <div class="form-grupo mb-2">
                        <label class="form-label" for="txtPasswordActual">Contraseña actual</label>
                        <div class="input-pass-wrap" id="wrapActual">
                            <input type="password" id="txtPasswordActual" placeholder="Su contraseña actual">
                            <button type="button" class="btn-toggle-pass" id="toggleActual"
                                data-target="txtPasswordActual">👁</button>
                        </div>
                        <span class="form-error" id="errActual"></span>
                    </div>

                    <div class="form-grupo mb-2">
                        <label class="form-label" for="txtNuevoPassword">Nueva contraseña</label>
                        <div class="input-pass-wrap" id="wrapNueva">
                            <input type="password" id="txtNuevoPassword" placeholder="Nueva contraseña">
                            <button type="button" class="btn-toggle-pass" id="toggleNueva"
                                data-target="txtNuevoPassword">👁</button>
                        </div>
                        <div class="fortaleza-barra-fondo">
                            <div id="barraFortaleza"></div>
                        </div>
                        <span id="etiquetaFortaleza"></span>
                        <span class="form-error" id="errNueva"></span>
                        <span class="form-ayuda">Mínimo 8 caracteres, una mayúscula, un número y un caracter especial.</span>
                    </div>

                    <div class="form-grupo">
                        <label class="form-label" for="txtConfirmarPassword">Confirmar contraseña</label>
                        <div class="input-pass-wrap" id="wrapConfirmar">
                            <input type="password" id="txtConfirmarPassword" placeholder="Repita la nueva contraseña">
                            <button type="button" class="btn-toggle-pass" id="toggleConfirmar"
                                data-target="txtConfirmarPassword">👁</button>
                        </div>
                        <span class="form-error" id="errConfirmar"></span>
                    </div>

                    <div class="form-acciones">
                        <button type="submit" class="btn btn-primary" id="btnGuardar">Guardar Contraseña</button>
                        <button type="button" class="btn btn-secondary" id="btnCancelar">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div id="alerta-global"></div>

    <script src="/NRC30713/Proyecto_pw/scripts/config.js?v=28"></script>
    <script src="/NRC30713/Proyecto_pw/scripts/utils.js?v=28"></script>
    <script src="/NRC30713/Proyecto_pw/scripts/session.js?v=28"></script>
    <script src="/NRC30713/Proyecto_pw/scripts/validaciones.js?v=28"></script>
    <script src="/NRC30713/Proyecto_pw/scripts/router.js?v=28"></script>
    <script src="/NRC30713/Proyecto_pw/scripts/cambiar-password.js?v=28"></script>
</body>
</html>
