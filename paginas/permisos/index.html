<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permisos — Sistema Genérico</title>
    <link rel="stylesheet" href="/NRC30713/Proyecto_pw/estilos/main.css?v=26">
    <link rel="stylesheet" href="/NRC30713/Proyecto_pw/estilos/dashboard.css?v=26">
    <link rel="stylesheet" href="/NRC30713/Proyecto_pw/estilos/components.css?v=26">
</head>
<body class="pag-contenido">

    <main class="contenido">
        <div class="breadcrumb">
            <span>Inicio</span><span>›</span><span>Permisos</span>
        </div>

        <div class="pag-titulo-wrap">
            <div>
                <h1 class="pag-titulo">Permisos</h1>
                <p class="pag-subtitulo">Asignación de permisos por rol</p>
            </div>
        </div>

        <div class="card mb-2">
            <div class="card-header">
                <span class="card-titulo">Seleccionar Rol</span>
            </div>
            <div class="card-body">
                <div class="form-grupo" style="max-width:320px">
                    <label class="form-label" for="selRolPermisos">Rol</label>
                    <select class="form-control" id="selRolPermisos">
                        <option value="">-- Seleccione un rol --</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card mb-2">
            <div class="card-header">
                <span class="card-titulo">Acceso a Frames</span>
                <div class="btn-group d-none" id="accionesPermisos">
                    <button class="btn btn-sm btn-outline" id="btnMarcarTodos">Marcar todos</button>
                    <button class="btn btn-sm btn-secondary" id="btnDesmarcarTodos">Desmarcar todos</button>
                    <button class="btn btn-sm btn-primary" id="btnGuardarPermisos">Guardar Permisos</button>
                </div>
            </div>
            <div class="card-body">
                <div id="matrizFrames">
                    <p class="text-muted text-center">Seleccione un rol para configurar sus permisos.</p>
                </div>
            </div>
        </div>

        <div class="card d-none" id="cardAcciones">
            <div class="card-header">
                <span class="card-titulo">Acciones internas por Frame</span>
            </div>
            <div class="card-body">
                <div id="matrizAcciones"></div>
            </div>
        </div>
    </main>

    <div id="alerta-global"></div>

    <script src="/NRC30713/Proyecto_pw/scripts/config.js?v=26"></script>
    <script src="/NRC30713/Proyecto_pw/scripts/utils.js?v=26"></script>
    <script src="/NRC30713/Proyecto_pw/scripts/session.js?v=26"></script>
    <script src="/NRC30713/Proyecto_pw/scripts/router.js?v=26"></script>
    <script src="/NRC30713/Proyecto_pw/scripts/permisos.js?v=26"></script>
    <script>document.addEventListener('DOMContentLoaded', iniciarPermisos);</script>
</body>
</html>
