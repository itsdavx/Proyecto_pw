<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Sistema Genérico</title>
    <link rel="stylesheet" href="/NRC30713-Web/Proyecto_pw/estilos/main.css?v=17">
    <link rel="stylesheet" href="/NRC30713-Web/Proyecto_pw/estilos/dashboard.css?v=17">
    <link rel="stylesheet" href="/NRC30713-Web/Proyecto_pw/estilos/components.css?v=17">
</head>
<body class="pag-contenido">

    <main class="contenido">
        <div class="breadcrumb">
            <span>Inicio</span>
            <span>›</span>
            <span>Dashboard</span>
        </div>

        <div class="pag-titulo-wrap">
            <div>
                <h1 class="pag-titulo" id="saludoUsuario">Bienvenido</h1>
                <p class="pag-subtitulo" id="fechaActual"></p>
            </div>
            <span class="badge badge-primary" id="rolUsuario"></span>
        </div>

        <div class="card mb-2">
            <div class="card-header">
                <span class="card-titulo">Acceso rápido</span>
                <button class="btn btn-sm btn-outline" id="btnPersonalizarAccesos">⚙ Personalizar</button>
            </div>
            <div class="card-body">
                <div class="btn-group" id="accesosRapidos"></div>
            </div>
        </div>

        <blockquote class="card mb-2 d-none" id="fraseCard"
            style="padding:1.2rem 1.4rem;font-style:italic;border-left:4px solid var(--primary)">
            <p id="fraseTexto" style="margin-bottom:.4rem"></p>
            <footer class="text-muted text-right" id="fraseAutor"></footer>
        </blockquote>

        <div class="stats-grid" id="seccionStats">
            <div class="stat-card">
                <div class="stat-icono">◈</div>
                <div>
                    <div class="stat-info-label">Usuarios</div>
                    <div class="stat-info-num" id="statUsuarios">—</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icono">◆</div>
                <div>
                    <div class="stat-info-label">Roles</div>
                    <div class="stat-info-num" id="statRoles">—</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icono">■</div>
                <div>
                    <div class="stat-info-label">Permisos</div>
                    <div class="stat-info-num" id="statPermisos">—</div>
                </div>
            </div>
        </div>
    </main>

    <div id="alerta-global"></div>

    <script src="/NRC30713-Web/Proyecto_pw/scripts/config.js?v=17"></script>
    <script src="/NRC30713-Web/Proyecto_pw/scripts/utils.js?v=17"></script>
    <script src="/NRC30713-Web/Proyecto_pw/scripts/session.js?v=17"></script>
    <script src="/NRC30713-Web/Proyecto_pw/scripts/router.js?v=17"></script>
    <script src="/NRC30713-Web/Proyecto_pw/scripts/dashboard.js?v=17"></script>
</body>
</html>
