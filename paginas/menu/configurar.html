<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar Menús — Sistema Genérico</title>
    <link rel="stylesheet" href="/NRC30713/Proyecto_pw/estilos/main.css?v=17">
    <link rel="stylesheet" href="/NRC30713/Proyecto_pw/estilos/dashboard.css?v=17">
    <link rel="stylesheet" href="/NRC30713/Proyecto_pw/estilos/components.css?v=17">
</head>
<body class="pag-contenido">

    <main class="contenido">
        <div class="breadcrumb">
            <span>Inicio</span><span>›</span><span>Configurar Menús</span>
        </div>

        <div class="pag-titulo-wrap">
            <div>
                <h1 class="pag-titulo">Configurar Menús</h1>
                <p class="pag-subtitulo">Disponibilidad global de los ItemMenu. Un ItemMenu inactivo no aparece ni puede abrirse por ningún usuario.</p>
            </div>
            <div class="btn-group">
                <button class="btn btn-outline" id="btnNuevoItemMenu">+ Nuevo ItemMenu</button>
                <button class="btn btn-primary" id="btnGuardarConfig">Guardar</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-titulo">ItemMenu del sistema</span>
            </div>
            <div class="tabla-wrap">
                <table class="tabla">
                    <thead>
                        <tr>
                            <th>N°</th>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>URL</th>
                            <th>Activo</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyConfigMenu">
                        <tr><td colspan="6" class="tabla-vacia">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal nuevo / editar ItemMenu -->
    <div class="modal-overlay" id="modalItemMenu">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-titulo" id="tituloModalItem">Nuevo ItemMenu</span>
                <button class="modal-cerrar" id="btnCerrarModalItem">✕</button>
            </div>
            <div class="modal-body">
                <form id="formItemMenu" novalidate>
                    <div class="form-grupo mb-2">
                        <label class="form-label" for="txtNombreItem">Nombre</label>
                        <input class="form-control" type="text" id="txtNombreItem" placeholder="Ej: Reportes">
                        <span class="form-error"></span>
                    </div>
                    <div class="form-grupo">
                        <label class="form-label" for="txtUrlItem">URL</label>
                        <input class="form-control" type="text" id="txtUrlItem" placeholder="/paginas/modulo/index.html">
                        <span class="form-error"></span>
                        <span class="form-ayuda">Debe iniciar con &quot;/&quot;. Es la ruta interna que abrirá este ItemMenu.</span>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="submit" form="formItemMenu" class="btn btn-primary">Guardar</button>
                <button type="button" class="btn btn-secondary" id="btnCancelarModalItem">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="alerta-global"></div>

    <script src="/NRC30713/Proyecto_pw/scripts/config.js?v=17"></script>
    <script src="/NRC30713/Proyecto_pw/scripts/utils.js?v=17"></script>
    <script src="/NRC30713/Proyecto_pw/scripts/session.js?v=17"></script>
    <script src="/NRC30713/Proyecto_pw/scripts/validaciones.js?v=17"></script>
    <script src="/NRC30713/Proyecto_pw/scripts/router.js?v=17"></script>
    <script src="/NRC30713/Proyecto_pw/scripts/confirmacion.js?v=17"></script>
    <script src="/NRC30713/Proyecto_pw/scripts/menu-config.js?v=17"></script>
    <script>document.addEventListener('DOMContentLoaded', iniciarConfigMenus);</script>
</body>
</html>
