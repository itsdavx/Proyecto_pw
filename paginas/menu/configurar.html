<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar Menús — Sistema Empresarial</title>
    <link rel="stylesheet" href="/NRC30713-Web/Proyecto_pw/estilos/main.css?v=10">
    <link rel="stylesheet" href="/NRC30713-Web/Proyecto_pw/estilos/dashboard.css?v=10">

</head>
<body class="pag-contenido">

    <main class="contenido">
        <div class="breadcrumb">
            <span>Inicio</span><span>›</span><span>Configurar Menús</span>
        </div>

        <div class="pag-titulo-wrap">
            <div>
                <h1 class="pag-titulo">Configurar Menús</h1>
                <p class="pag-subtitulo">Disponibilidad global de los ItemMenu. Un ItemMenu inactivo no aparece ni puede abrirse por ningún usuario.</p>
            </div>
            <button class="btn btn-primary" id="btnGuardarConfig">Guardar</button>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-titulo">ItemMenu del sistema</span>
            </div>
            <div class="tabla-wrap">
                <table class="tabla">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>ItemMenu</th>
                            <th>Módulo</th>
                            <th>Disponibilidad</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyConfigMenu">
                        <tr><td colspan="4" class="tabla-vacia">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="alerta-global"></div>

    <script src="/NRC30713-Web/Proyecto_pw/scripts/config.js?v=10"></script>
    <script src="/NRC30713-Web/Proyecto_pw/scripts/utils.js?v=10"></script>
    <script src="/NRC30713-Web/Proyecto_pw/scripts/session.js?v=10"></script>
    <script src="/NRC30713-Web/Proyecto_pw/scripts/router.js?v=10"></script>
    <script src="/NRC30713-Web/Proyecto_pw/scripts/menu-config.js?v=10"></script>
    <script>document.addEventListener('DOMContentLoaded', iniciarConfigMenus);</script>
</body>
</html>
