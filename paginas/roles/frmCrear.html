<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rol — Sistema Empresarial</title>
    <link rel="stylesheet" href="/NRC30713-Web/Proyecto_pw/estilos/main.css?v=10">
    <link rel="stylesheet" href="/NRC30713-Web/Proyecto_pw/estilos/dashboard.css?v=10">
    <link rel="stylesheet" href="/NRC30713-Web/Proyecto_pw/estilos/components.css?v=10">
</head>
<body class="pag-contenido">

    <main class="contenido">
        <div class="breadcrumb">
            <a href="/NRC30713-Web/Proyecto_pw/paginas/roles/index.html">Roles</a>
            <span>›</span><span id="tituloModo">Nuevo Rol</span>
        </div>

        <div class="pag-titulo-wrap">
            <h1 class="pag-titulo" id="tituloModo2">Nuevo Rol</h1>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-titulo">Datos del rol</span>
            </div>
            <div class="card-body">
                <form id="formRol" novalidate>
                    <div class="form-grid">

                        <div class="form-grupo">
                            <label class="form-label" for="txtNombreRol">Nombre del rol</label>
                            <input class="form-control" type="text" id="txtNombreRol" placeholder="Ej: Administrador">
                            <span class="form-error"></span>
                        </div>

                        <div class="form-grupo">
                            <label class="form-label" for="txtDescripcion">Descripción</label>
                            <input class="form-control" type="text" id="txtDescripcion" placeholder="Descripción opcional">
                            <span class="form-error"></span>
                        </div>

                        <div class="form-grupo">
                            <label class="form-label">Estado</label>
                            <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;margin-top:.3rem">
                                <input type="checkbox" id="chkEstado" checked
                                    style="width:18px;height:18px;accent-color:var(--primary)">
                                <span>Activo</span>
                            </label>
                        </div>

                    </div>

                    <div class="form-acciones">
                        <button type="submit" class="btn btn-primary">Guardar Rol</button>
                        <button type="button" class="btn btn-secondary" id="btnCancelar">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div id="alerta-global"></div>

    <script src="/NRC30713-Web/Proyecto_pw/scripts/config.js?v=10"></script>
    <script src="/NRC30713-Web/Proyecto_pw/scripts/utils.js?v=10"></script>
    <script src="/NRC30713-Web/Proyecto_pw/scripts/session.js?v=10"></script>
    <script src="/NRC30713-Web/Proyecto_pw/scripts/validaciones.js?v=10"></script>
    <script src="/NRC30713-Web/Proyecto_pw/scripts/router.js?v=10"></script>
    <script src="/NRC30713-Web/Proyecto_pw/scripts/roles.js?v=10"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const esEditar = !!new URLSearchParams(location.search).get('id');
            const titulo   = esEditar ? 'Editar Rol' : 'Nuevo Rol';
            document.querySelectorAll('#tituloModo, #tituloModo2').forEach(el => el.textContent = titulo);
            iniciarFormRol();
        });
    </script>
</body>
</html>
